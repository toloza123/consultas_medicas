<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(titulo, contenido)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${titulo}">Consultas Médicas</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background-color: #f0f4f8; }
        .navbar-brand .text-accent { color: #20c997; }
        .sidebar { min-height: calc(100vh - 70px); background: #fff; border-right: 1px solid #dee2e6; }
        .sidebar .nav-link { color: #495057; border-radius: 8px; margin-bottom: 2px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #e8f5e9; color: #0d6efd; }
        .sidebar .nav-link i { width: 22px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        footer { font-size: 0.82rem; }
        .badge-rol { font-size: 0.72rem; }
    </style>
</head>
<body>

<!-- ═══ NAVBAR ═══════════════════════════════════════════════ -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-heart-pulse-fill me-1" style="color:#20c997"></i>
            Consultas<span class="text-accent">Médicas</span>
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/usuarios}">
                        <i class="bi bi-people-fill me-1"></i>Usuarios
                    </a>
                </li>
            </ul>

            <!-- Usuario autenticado -->
            <div class="navbar-text text-white me-3" style="font-size:0.85rem"
                 sec:authorize="isAuthenticated()">
                <i class="bi bi-person-circle me-1"></i>
                <span sec:authentication="name"></span>
            </div>

            <!-- Cerrar sesión -->
            <form th:action="@{/auth/logout}" method="post"
                  sec:authorize="isAuthenticated()">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </button>
            </form>
        </div>
    </div>
</nav>

<!-- ═══ CONTENIDO ════════════════════════════════════════════ -->
<main class="container-fluid">
    <div class="row">
        <!-- Sidebar solo cuando está autenticado -->
        <div class="col-md-2 sidebar py-3 d-none d-md-block"
             sec:authorize="isAuthenticated()">
            <p class="text-muted px-2 mb-1" style="font-size:0.75rem;text-transform:uppercase;letter-spacing:.05em">
                Menú principal
            </p>
            <nav class="nav flex-column px-1">
                <a class="nav-link" th:href="@{/dashboard}">
                    <i class="bi bi-house-fill"></i> Inicio
                </a>
                <a class="nav-link" th:href="@{/citas}">
                    <i class="bi bi-calendar-check"></i> Mis citas
                </a>
                <a class="nav-link" th:href="@{/historial}">
                    <i class="bi bi-file-medical"></i> Historial
                </a>
                <a class="nav-link" sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin/usuarios}">
                    <i class="bi bi-shield-lock"></i> Administración
                </a>
            </nav>
            <hr/>
            <div class="px-2" style="font-size:0.78rem;color:#6c757d">
                <i class="bi bi-person-fill me-1"></i>Heiner A. Toloza P.<br/>
                <i class="bi bi-envelope me-1"></i>hatoloza@uts.edu.co
            </div>
        </div>

        <!-- Área principal -->
        <div class="col py-4 px-4">
            <div th:replace="${contenido}"></div>
        </div>
    </div>
</main>

<!-- ═══ FOOTER ═══════════════════════════════════════════════ -->
<footer class="bg-dark text-white text-center py-2 mt-3">
    <i class="bi bi-heart-pulse-fill me-1" style="color:#20c997"></i>
    Sistema de Consultas Médicas &mdash;
    <strong>Heiner Alexander Toloza Porras</strong> &mdash; hatoloza@uts.edu.co
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
