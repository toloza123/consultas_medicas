<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragmentos/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Dashboard - Consultas Médicas</title>
</head>
<body>
<section th:fragment="contenido">

    <!-- Saludo -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-speedometer2 text-primary me-2"></i>Dashboard
            </h4>
            <p class="text-muted small mb-0">
                Bienvenido,
                <strong th:text="${usuarioActual?.nombre ?: 'Usuario'}"></strong>
                <span class="badge bg-primary badge-rol ms-1"
                      th:text="${usuarioActual?.rol?.replace('ROLE_','')}"></span>
            </p>
        </div>
        <div class="text-muted small">
            <i class="bi bi-calendar3 me-1"></i>
            <span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy')}"></span>
        </div>
    </div>

    <!-- Tarjetas de resumen -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
            <div class="card border-start border-primary border-3">
                <div class="card-body d-flex align-items-center gap-3 py-3">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                        <i class="bi bi-calendar-check-fill text-primary fs-4"></i>
                    </div>
                    <div>
                        <p class="mb-0 text-muted small">Citas programadas</p>
                        <h5 class="mb-0 fw-bold">—</h5>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card border-start border-success border-3">
                <div class="card-body d-flex align-items-center gap-3 py-3">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3">
                        <i class="bi bi-file-medical-fill text-success fs-4"></i>
                    </div>
                    <div>
                        <p class="mb-0 text-muted small">Consultas atendidas</p>
                        <h5 class="mb-0 fw-bold">—</h5>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card border-start border-info border-3">
                <div class="card-body d-flex align-items-center gap-3 py-3">
                    <div class="rounded-circle bg-info bg-opacity-10 p-3">
                        <i class="bi bi-activity text-info fs-4"></i>
                    </div>
                    <div>
                        <p class="mb-0 text-muted small">Lecturas biométricas</p>
                        <h5 class="mb-0 fw-bold">—</h5>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3" sec:authorize="hasRole('ADMIN')">
            <div class="card border-start border-warning border-3">
                <div class="card-body d-flex align-items-center gap-3 py-3">
                    <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                        <i class="bi bi-people-fill text-warning fs-4"></i>
                    </div>
                    <div>
                        <p class="mb-0 text-muted small">Usuarios registrados</p>
                        <h5 class="mb-0 fw-bold">—</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Info del sistema -->
    <div class="card">
        <div class="card-header bg-dark text-white py-2">
            <i class="bi bi-info-circle me-1"></i> Estado del sistema
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <h6 class="fw-semibold text-secondary">Datos de la sesión</h6>
                    <table class="table table-sm table-borderless">
                        <tr>
                            <td class="text-muted small">Usuario:</td>
                            <td class="small fw-medium" th:text="${usuarioActual?.nombre}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted small">Correo:</td>
                            <td class="small" sec:authentication="name"></td>
                        </tr>
                        <tr>
                            <td class="text-muted small">Rol:</td>
                            <td>
                                <span class="badge bg-primary small"
                                      th:text="${usuarioActual?.rol?.replace('ROLE_','')}"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted small">Registro:</td>
                            <td class="small"
                                th:text="${#temporals.format(usuarioActual?.fechaRegistro,'dd/MM/yyyy HH:mm')}"></td>
                        </tr>
                    </table>
                </div>
                <div class="col-md-6">
                    <h6 class="fw-semibold text-secondary">Accesos rápidos</h6>
                    <div class="d-flex flex-wrap gap-2 mt-2">
                        <a th:href="@{/citas}" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-calendar-plus me-1"></i>Nueva cita
                        </a>
                        <a th:href="@{/historial}" class="btn btn-outline-success btn-sm">
                            <i class="bi bi-file-text me-1"></i>Ver historial
                        </a>
                        <a th:href="@{/admin/usuarios}"
                           sec:authorize="hasRole('ADMIN')"
                           class="btn btn-outline-warning btn-sm">
                            <i class="bi bi-people me-1"></i>Gestionar usuarios
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
