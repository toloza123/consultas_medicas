<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar Sesión - Consultas Médicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .login-header {
            background: #fff;
            border-radius: 16px 16px 0 0;
            padding: 2rem 2rem 1rem;
            text-align: center;
        }
        .login-icon {
            width: 64px; height: 64px;
            background: #e8f4fd;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 28px; color: #0d6efd;
        }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 .2rem rgba(13,110,253,.15); }
        .btn-login { border-radius: 8px; padding: .6rem; font-weight: 500; }
        .input-group-text { background: #f8f9fa; border-right: none; }
        .form-control { border-left: none; }
        .password-toggle { cursor: pointer; background: #f8f9fa; border-left: none; }
        footer { background: rgba(0,0,0,.2); color: rgba(255,255,255,.8); font-size: .8rem; }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="card login-card">

        <!-- Cabecera -->
        <div class="login-header">
            <div class="login-icon">
                <i class="bi bi-heart-pulse-fill"></i>
            </div>
            <h4 class="fw-bold text-dark mb-0">Consultas Médicas</h4>
            <p class="text-muted small mb-0">Sistema de gestión clínica</p>
        </div>

        <div class="card-body p-4">
            <h5 class="fw-semibold mb-4 text-center text-secondary">Iniciar Sesión</h5>

            <!-- Mensaje de éxito tras registro -->
            <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible py-2" role="alert">
                <i class="bi bi-check-circle me-1"></i>
                <span th:text="${mensajeExito}"></span>
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
            </div>

            <!-- Error de credenciales -->
            <div th:if="${param.error}" class="alert alert-danger alert-dismissible py-2" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                Correo o contraseña incorrectos. Intenta nuevamente.
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
            </div>

            <!-- Confirmación de cierre de sesión -->
            <div th:if="${param.logout}" class="alert alert-info alert-dismissible py-2" role="alert">
                <i class="bi bi-info-circle me-1"></i>
                Sesión cerrada correctamente.
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
            </div>

            <!-- Formulario de login — Spring Security procesa POST /auth/login -->
            <form th:action="@{/auth/login}" method="post">

                <!-- CSRF token (Spring Security lo requiere) -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Correo -->
                <div class="mb-3">
                    <label for="correo" class="form-label fw-medium small text-secondary">
                        Correo electrónico
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope text-secondary"></i>
                        </span>
                        <input type="email"
                               class="form-control"
                               id="correo"
                               name="correo"
                               placeholder="tucorreo@ejemplo.com"
                               required
                               autofocus/>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-4">
                    <label for="contrasena" class="form-label fw-medium small text-secondary">
                        Contraseña
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock text-secondary"></i>
                        </span>
                        <input type="password"
                               class="form-control"
                               id="contrasena"
                               name="contrasena"
                               placeholder="Tu contraseña"
                               required/>
                        <button class="btn btn-outline-secondary password-toggle"
                                type="button"
                                onclick="togglePass()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Botón -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-login">
                        <i class="bi bi-box-arrow-in-right me-1"></i>
                        Ingresar al sistema
                    </button>
                </div>

                <!-- Enlace a registro -->
                <p class="text-center small text-muted mb-0">
                    ¿No tienes cuenta?
                    <a th:href="@{/auth/registro}" class="text-primary fw-medium">Regístrate aquí</a>
                </p>
            </form>

        </div><!-- card-body -->
    </div><!-- card -->
</div>

<!-- Footer -->
<footer class="text-center py-2">
    <i class="bi bi-person-fill me-1"></i>
    <strong>Heiner Alexander Toloza Porras</strong> &mdash; hatoloza@uts.edu.co
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePass() {
        const input = document.getElementById('contrasena');
        const icon  = document.getElementById('toggleIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
</script>
</body>
</html>
