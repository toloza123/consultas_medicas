<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro - Consultas Médicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .registro-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .registro-card {
            width: 100%;
            max-width: 480px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .registro-header {
            background: #fff;
            border-radius: 16px 16px 0 0;
            padding: 2rem 2rem 1rem;
            text-align: center;
        }
        .registro-icon {
            width: 64px; height: 64px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 28px; color: #198754;
        }
        .form-control:focus { border-color: #198754; box-shadow: 0 0 0 .2rem rgba(25,135,84,.15); }
        .btn-registro { border-radius: 8px; padding: .6rem; font-weight: 500; }
        .input-group-text { background: #f8f9fa; }
        .requisito { font-size: .75rem; color: #6c757d; }
        footer { background: rgba(0,0,0,.2); color: rgba(255,255,255,.8); font-size: .8rem; }
    </style>
</head>
<body>

<div class="registro-wrapper">
    <div class="card registro-card">

        <!-- Cabecera -->
        <div class="registro-header">
            <div class="registro-icon">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h4 class="fw-bold text-dark mb-0">Crear cuenta</h4>
            <p class="text-muted small mb-0">Consultas Médicas &bull; Registro de pacientes</p>
        </div>

        <div class="card-body p-4">

            <!-- Error de correo duplicado -->
            <div th:if="${errorCorreo}" class="alert alert-danger alert-dismissible py-2" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                <span th:text="${errorCorreo}"></span>
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/auth/registro}" th:object="${usuario}" method="post" novalidate>

                <!-- CSRF -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Nombre completo -->
                <div class="mb-3">
                    <label for="nombre" class="form-label fw-medium small text-secondary">
                        Nombre completo
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person text-secondary"></i>
                        </span>
                        <input type="text"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                               id="nombre"
                               th:field="*{nombre}"
                               placeholder="Tu nombre completo"
                               required/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}"></div>
                    </div>
                </div>

                <!-- Correo -->
                <div class="mb-3">
                    <label for="correo" class="form-label fw-medium small text-secondary">
                        Correo electrónico
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope text-secondary"></i>
                        </span>
                        <input type="email"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('correo')} ? 'is-invalid'"
                               id="correo"
                               th:field="*{correo}"
                               placeholder="tucorreo@ejemplo.com"
                               required/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('correo')}"
                             th:errors="*{correo}"></div>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-3">
                    <label for="contrasena" class="form-label fw-medium small text-secondary">
                        Contraseña
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock text-secondary"></i>
                        </span>
                        <input type="password"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('contrasena')} ? 'is-invalid'"
                               id="contrasena"
                               th:field="*{contrasena}"
                               placeholder="Mínimo 6 caracteres"
                               required/>
                        <button class="btn btn-outline-secondary"
                                type="button"
                                onclick="togglePass('contrasena','iconPass')">
                            <i class="bi bi-eye" id="iconPass"></i>
                        </button>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('contrasena')}"
                             th:errors="*{contrasena}"></div>
                    </div>
                    <p class="requisito mt-1 mb-0">
                        <i class="bi bi-info-circle me-1"></i>La contraseña se almacena cifrada con BCrypt.
                    </p>
                </div>

                <!-- Confirmar contraseña (solo validación JS) -->
                <div class="mb-4">
                    <label for="confirmContrasena" class="form-label fw-medium small text-secondary">
                        Confirmar contraseña
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill text-secondary"></i>
                        </span>
                        <input type="password"
                               class="form-control"
                               id="confirmContrasena"
                               placeholder="Repite tu contraseña"
                               required/>
                        <button class="btn btn-outline-secondary"
                                type="button"
                                onclick="togglePass('confirmContrasena','iconConf')">
                            <i class="bi bi-eye" id="iconConf"></i>
                        </button>
                        <div class="invalid-feedback" id="errorConfirm">
                            Las contraseñas no coinciden.
                        </div>
                    </div>
                </div>

                <!-- Botón registrar -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-success btn-registro" onclick="return validar()">
                        <i class="bi bi-person-check-fill me-1"></i>
                        Crear mi cuenta
                    </button>
                </div>

                <!-- Volver al login -->
                <p class="text-center small text-muted mb-0">
                    ¿Ya tienes cuenta?
                    <a th:href="@{/auth/login}" class="text-primary fw-medium">Inicia sesión</a>
                </p>

            </form>
        </div>
    </div>
</div>

<footer class="text-center py-2">
    <i class="bi bi-person-fill me-1"></i>
    <strong>Heiner Alexander Toloza Porras</strong> &mdash; hatoloza@uts.edu.co
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePass(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon  = document.getElementById(iconId);
        input.type = (input.type === 'password') ? 'text' : 'password';
        icon.className = (input.type === 'password') ? 'bi bi-eye' : 'bi bi-eye-slash';
    }

    function validar() {
        const p1 = document.getElementById('contrasena').value;
        const p2 = document.getElementById('confirmContrasena').value;
        const errDiv = document.getElementById('errorConfirm');
        const input2 = document.getElementById('confirmContrasena');
        if (p1 !== p2) {
            input2.classList.add('is-invalid');
            errDiv.style.display = 'block';
            return false;
        }
        input2.classList.remove('is-invalid');
        return true;
    }
</script>
</body>
</html>
